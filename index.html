<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valorant Characters</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <!-- Navbar Start -->
    <header class="container">
      <nav>
        <div class="logo">
          <img
            src="https://static.wikia.nocookie.net/valorant/images/8/88/Valorant_icon.png/revision/latest?cb=20200305120117"
            alt="Valorant Icon"
          />
          <h4>Valorant</h4>
        </div>

        <div class="links">
            <a href="https://valorant.fandom.com/wiki/Agents">Agents</a>
            <a href="https://valorant.fandom.com/wiki/Weapons">Weapons</a>
            <a href="https://valorant.fandom.com/wiki/Maps">Maps</a>
            <a href="https://valorant.fandom.com/wiki/Game_Modes">Game Modes</a>
            <a href="https://valorant.fandom.com/wiki/VALORANT_Lore">Game Lore</a>
        </div>

        <div>
            <button class="play_btn">
                <a href="https://playvalorant.com/en-us/download/">
                    <h4>Play Now</h4>
                </a>
            </button>
        </div>
      </nav>
    </header>
    <!-- Nav Bar End -->
<!-- Hero Section Start -->
    <section class="hero-background">
        <article class="hero">
            <h1>VALORANT</h1>
            <h2>VALORANT — A <em>5V5 TACTICAL</em> SHOOTER FEATURING AGENTS WITH UNIQUE ABILITIES</h2>
            <button><p>PLAY FOR FREE</p></button>
        </article>
    </section>
    <!-- Hero Section End -->

    <section class="container">
        <h1 class="agent-h1">Meet THE Agents</h1>
        <article class="agents">
            <div class="agent">
                <img src="https://static.wikia.nocookie.net/valorant/images/8/88/Cypher_icon.png/revision/latest/scale-to-width-down/1000?cb=20230523180623" alt="">
                <small>SENTINEL</small>
                <p>CYPHER</p>
                <h4>NEURAL THEFT</h4>
            </div>
            <div class="agent">
                <img src="https://static.wikia.nocookie.net/valorant/images/0/09/Chamber_icon.png/revision/latest/scale-to-width-down/1000?cb=20230523180616" alt="">
                <small>SENTINEL</small>
                <p>CHAMBER</p>
                <h4>TOUR DE FORCE</h4>
            </div>
            <div class="agent">
                <img src="https://static.wikia.nocookie.net/valorant/images/b/b0/Reyna_icon.png/revision/latest/scale-to-width-down/1000?cb=20230606161102" alt="">
                <small>DUELIST</small>
                <p>REYNA</p>
                <h4>EMPRESS</h4>
            </div>
            <div class="agent">
                <img src="https://static.wikia.nocookie.net/valorant/images/7/74/Sage_icon.png/revision/latest/scale-to-width-down/1000?cb=20260317170200" alt="">
                <small>SENTINEL</small>
                <p>SAGE</p>
                <h4>RESURRECTION</h4>
            </div>
        </article>
    </section>

    <section>
        
    </section>
  </body>
</html>
